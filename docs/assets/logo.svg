<svg viewBox="0 0 1280 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="binary-quant-trader">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="340" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="338" rx="17" fill="none" stroke="#262626"/>

  <!-- logo mark: brand candlestick tile (matches the favicon) -->
  <g transform="translate(96,104)">
    <rect width="132" height="132" rx="28" fill="#b026ff"/>
    <line x1="38" y1="24" x2="38" y2="108" stroke="#ffffff" stroke-width="6" stroke-opacity="0.55"/>
    <rect x="26" y="50" width="24" height="40" rx="4" fill="#ffffff" fill-opacity="0.55"/>
    <line x1="92" y1="16" x2="92" y2="116" stroke="#ffffff" stroke-width="7"/>
    <rect x="79" y="38" width="26" height="56" rx="4" fill="#ffffff"/>
  </g>

  <!-- wordmark -->
  <text x="288" y="150" font-family="'JetBrains Mono','Fira Code',monospace" font-size="58" font-weight="700" fill="#ffffff">binary-quant-trader</text>
  <text x="290" y="196" font-family="Arial,Helvetica,sans-serif" font-size="24" fill="#a3a3a3">Hybrid AI trading for binary options — it grades its own homework.</text>

  <!-- feature chips -->
  <g font-family="Arial,Helvetica,sans-serif" font-size="17">
    <rect x="290" y="228" width="200" height="40" rx="20" fill="#b026ff" fill-opacity="0.12" stroke="#b026ff" stroke-opacity="0.35"/>
    <text x="315" y="253" fill="#b026ff">🧠 Generative AI</text>
    <rect x="504" y="228" width="180" height="40" rx="20" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.35"/>
    <text x="528" y="253" fill="#10b981">📊 Meta-labeling</text>
    <rect x="698" y="228" width="168" height="40" rx="20" fill="#141414" stroke="#262626"/>
    <text x="720" y="253" fill="#a3a3a3">⚖️ Honest by design</text>
  </g>

  <!-- AGPL badge -->
  <text x="1184" y="60" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="16" fill="#525252">AGPL-3.0 · open source</text>
</svg>
