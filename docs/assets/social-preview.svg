<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="binary-quant-trader">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- logo mark -->
  <g transform="translate(96,92)">
    <rect width="120" height="120" rx="26" fill="#b026ff"/>
    <line x1="35" y1="22" x2="35" y2="98" stroke="#ffffff" stroke-width="5.5" stroke-opacity="0.55"/>
    <rect x="24" y="46" width="22" height="36" rx="4" fill="#ffffff" fill-opacity="0.55"/>
    <line x1="84" y1="15" x2="84" y2="106" stroke="#ffffff" stroke-width="6.5"/>
    <rect x="72" y="35" width="24" height="50" rx="4" fill="#ffffff"/>
  </g>

  <text x="248" y="150" font-family="'JetBrains Mono','Fira Code',monospace" font-size="60" font-weight="700" fill="#ffffff">binary-quant-trader</text>
  <text x="250" y="196" font-family="Arial,Helvetica,sans-serif" font-size="26" fill="#b0b0b0">Hybrid AI trading for binary options — honest by design.</text>

  <!-- the hook: two AIs -->
  <g font-family="Arial,Helvetica,sans-serif">
    <rect x="96" y="266" width="520" height="286" rx="16" fill="#0a0a0a" stroke="#b026ff" stroke-opacity="0.35"/>
    <text x="128" y="322" font-size="22" font-weight="700" fill="#b026ff">🧠 Generative AI</text>
    <text x="128" y="358" font-size="19" fill="#a3a3a3">Reads the news and</text>
    <text x="128" y="386" font-size="19" fill="#a3a3a3">writes new strategies</text>
    <text x="128" y="414" font-size="19" fill="#a3a3a3">from scratch.</text>
    <text x="128" y="470" font-size="15" fill="#8a1cc4">The confident creative.</text>
    <text x="128" y="510" font-size="15" fill="#525252">DeepSeek / GPT / Gemini / Claude</text>

    <rect x="664" y="266" width="520" height="286" rx="16" fill="#0a0a0a" stroke="#10b981" stroke-opacity="0.35"/>
    <text x="696" y="322" font-size="22" font-weight="700" fill="#10b981">📊 Traditional ML</text>
    <text x="696" y="358" font-size="19" fill="#a3a3a3">Learns from real trades</text>
    <text x="696" y="386" font-size="19" fill="#a3a3a3">and distrusts whatever</text>
    <text x="696" y="414" font-size="19" fill="#a3a3a3">the first one wrote.</text>
    <text x="696" y="470" font-size="15" fill="#065f46">The skeptic.</text>
    <text x="696" y="510" font-size="15" fill="#525252">Logistic Regression / XGBoost</text>
  </g>

  <text x="1184" y="600" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="16" fill="#404040">One creates. One judges.  ·  AGPL-3.0</text>
</svg>
